# MLflow AI Gateway route configuration (mlflow 2.x format)
#
# Routes:
#   llama-chat        — Llama 3.2 (3B, fast) via Ollama
#   mistral-chat      — Mistral 7B (higher quality) via Ollama
#   ollama-embeddings — nomic-embed-text via Ollama

routes:
  - name: llama-chat
    route_type: llm/v1/chat
    model:
      provider: ollama
      name: llama3.2
      config:
        ollama_base_url: http://ollama:11434

  - name: mistral-chat
    route_type: llm/v1/chat
    model:
      provider: ollama
      name: mistral
      config:
        ollama_base_url: http://ollama:11434

  - name: ollama-embeddings
    route_type: llm/v1/embeddings
    model:
      provider: ollama
      name: nomic-embed-text
      config:
        ollama_base_url: http://ollama:11434
