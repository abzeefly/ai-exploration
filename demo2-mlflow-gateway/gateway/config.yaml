# MLflow AI Gateway endpoint configuration (mlflow 3.x)
#
# Ollama exposes a fully OpenAI-compatible API at /v1.
# We use the 'openai' provider with openai_api_base pointing at Ollama.
#
# Endpoints:
#   llama-chat        — Llama 3.2 (3B, fast) via Ollama /v1
#   mistral-chat      — Mistral 7B (quality) via Ollama /v1
#   ollama-embeddings — nomic-embed-text via Ollama /v1

endpoints:
  - name: llama-chat
    endpoint_type: llm/v1/chat
    model:
      provider: openai
      name: llama3.2
      config:
        openai_api_key: ollama
        openai_api_base: http://ollama:11434/v1

  - name: mistral-chat
    endpoint_type: llm/v1/chat
    model:
      provider: openai
      name: mistral
      config:
        openai_api_key: ollama
        openai_api_base: http://ollama:11434/v1

  - name: ollama-embeddings
    endpoint_type: llm/v1/embeddings
    model:
      provider: openai
      name: nomic-embed-text
      config:
        openai_api_key: ollama
        openai_api_base: http://ollama:11434/v1
